name: Check Email (NIC.cz Auctions)

on:
  schedule:
    - cron: '5 21 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check email for auction domains
        run: npx tsx scripts/check-email.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASS: ${{ secrets.IMAP_PASS }}
